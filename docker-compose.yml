# Local containerised stack for fpl-ai.
#
#   docker compose up --build
#   open http://localhost:8080
#
# The frontend nginx container reverse-proxies "/api/*" to the backend
# container, so the browser only ever talks to a single origin.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: fpl-ai-backend:latest
    container_name: fpl-ai-backend
    restart: unless-stopped
    environment:
      - FPL_AI_CORS_ORIGINS=*
    expose:
      - "8000"
    ports:
      - "8000:8000"   # comment out if you only want access via the proxy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser hits the nginx proxy, which forwards to the backend.
        VITE_API_BASE: /api
    image: fpl-ai-frontend:latest
    container_name: fpl-ai-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
